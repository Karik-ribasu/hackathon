components:
  securitySchemes:
    kong_consumer:
      type: apiKey
      name: X-Consumer-Custom-ID
      in: header
      description: School ID provided by Kong gateway after API key validation.
    api_key:
      type: apiKey
      name: apiKey
      in: header
      description: API key authentication using the apiKey header.
  schemas:
    error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
              oneOf:
              - type: array
                items:
                  oneOf:
                  - type: string
                  - type: object
                    additionalProperties:
                      type: string
              - type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
          required:
          - code
          - message
          additionalProperties: false
      required:
      - error
      additionalProperties: false
    payment_required_error:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
      required:
      - error
      - error_description
      additionalProperties: false
    validation_error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
              oneOf:
              - type: array
                items:
                  oneOf:
                  - type: string
                  - type: object
                    additionalProperties:
                      type: string
              - type: object
                additionalProperties:
                  type: array
                  items:
                    type: string
          required:
          - code
          - message
          additionalProperties: false
      required:
      - error
      additionalProperties: false
    pagination_meta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
      required:
      - page
      - per_page
      - total_pages
      - total_count
      additionalProperties: false
    meta_data:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        from:
          type: integer
        to:
          type: integer
        per_page:
          type: integer
        number_of_pages:
          type: integer
      required:
      - total
      - page
      - from
      - to
      - per_page
      - number_of_pages
      additionalProperties: false
    product:
      type: object
      properties:
