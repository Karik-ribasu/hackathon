---
openapi: 3.0.3
info:
  title: Public API V2 - Admin API
  version: v2
  description: |-
    Admin API for school owners and administrators.

    This API allows administrators to manage courses, enrollments, users,
    and other school resources using API key authentication.
servers:
- url: https://developers.teachable.com/
paths:
  "/kong_api/v2/products/coaching":
    get:
      summary: "/v2/products/coaching"
      tags:
      - Coaching
      description: Retrieve a list of coaching products for the school. Coaching products
        are returned in order of creation date, with the most recently created products
        appearing first.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/coaching"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - data
                - meta
                additionalProperties: false
  "/kong_api/v2/products/coaching/{id}":
    get:
      summary: "/v2/products/coaching/{id}"
      tags:
      - Coaching
      description: Retrieve details of a specific coaching product by its ID.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: id
        in: path
        required: true
        description: Coaching Product ID
        schema:
          type: integer
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/coaching"
                required:
                - data
                additionalProperties: false
        '404':
          description: Coaching product not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/comments":
    get:
      summary: "/v2/products/courses/{course_id}/comments"
      tags:
      - Courses
      description: Retrieve a list of comments for a specific course. Comments are
        returned in order of creation date, with the most recently created comments
        appearing first.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: created_after
        in: query
        required: false
        description: Filter comments created after this ISO8601 datetime
        schema:
          type: string
      - name: created_before
        in: query
        required: false
        description: Filter comments created before this ISO8601 datetime
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (approved, awaiting_review, removed, hidden_removed)
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: sort_by
        in: query
        required: false
        description: Sort by field (created_at, updated_at)
        schema:
          type: string
      - name: sort_direction
        in: query
        required: false
        description: Sort direction (asc, desc)
        schema:
          type: string
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/comment"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - data
                - meta
                additionalProperties: false
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Invalid parameters
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_error"
  "/kong_api/v2/products/courses/{course_id}/compliance":
    get:
      summary: "/v2/products/courses/{course_id}/compliance"
      tags:
      - Courses
      description: Retrieve the compliance configuration for a specific course.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/course_compliance"
                required:
                - data
                additionalProperties: false
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    patch:
      summary: "/v2/products/courses/{course_id}/compliance"
      tags:
      - Courses
      description: Update the compliance configuration for a specific course.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      responses:
        '204':
          description: Successful
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/curriculum":
    get:
      summary: "/v2/products/courses/{course_id}/curriculum"
      tags:
      - Courses
      description: Retrieve the curriculum for a specific course, including its sections
        and lessons. The curriculum is returned in a nested structure, with sections
        containing their associated lessons.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/lecture_section"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - data
                - meta
  "/kong_api/v2/products/courses/{course_id}/enrollments":
    get:
      summary: "/v2/products/courses/{course_id}/enrollments"
      tags:
      - Courses
      description: Retrieve a list of enrollments for a specific course. Enrollments
        can be filtered by enrollment date and status. The list is returned in order
        of enrollment date, with the most recently enrolled users appearing first.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: enrolled_after
        in: query
        required: false
        description: Filter enrollments after this ISO8601 datetime
        schema:
          type: string
      - name: enrolled_before
        in: query
        required: false
        description: Filter enrollments before this ISO8601 datetime
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (active, completed, expired, disabled)
        schema:
          type: string
      - name: user_id
        in: query
        required: false
        description: Filter enrollments for a specific user
        schema:
          type: string
      - name: sort_by
        in: query
        required: false
        description: Sort field (enrolled_at, completed_at)
        schema:
          type: string
      - name: sort_direction
        in: query
        required: false
        description: Sort direction (asc, desc)
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: string
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: string
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/enrollment"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - data
                - meta
                additionalProperties: false
        '404':
          description: Course not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/enrollments/{id}":
    get:
      summary: "/v2/products/courses/{course_id}/enrollments/{user_id}"
      tags:
      - Courses
      description: Retrieve a single course enrollment for a specific user. Returns
        the enrollment details including progress information.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/enrollment"
                required:
                - data
                additionalProperties: false
        '404':
          description: Enrollment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    put:
      summary: "/v2/products/courses/{course_id}/enrollments/{user_id}"
      tags:
      - Courses
      description: Enroll a user in a specific course. If the user is already enrolled,
        returns the existing enrollment.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
      responses:
        '200':
          description: User enrolled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/enrollment"
                required:
                - data
                additionalProperties: false
        '404':
          description: User not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Enrollment creation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    delete:
      summary: "/v2/products/courses/{course_id}/enrollments/{user_id}"
      tags:
      - Courses
      description: Unenroll a user from a specific course.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
      responses:
        '204':
          description: User unenrolled successfully
        '404':
          description: User not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Unenrollment failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/comments":
    get:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/comments"
      tags:
      - Courses
      description: Retrieve a list of comments for a specific lecture. Comments can
        be filtered by creation date and status. The list is returned in order of
        creation date, with the most recently created comments appearing first.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: created_after
        in: query
        required: false
        description: Filter comments created after this ISO8601 datetime
        schema:
          type: string
      - name: created_before
        in: query
        required: false
        description: Filter comments created before this ISO8601 datetime
        schema:
          type: string
      - name: status
        in: query
        required: false
        description: Filter by status (approved, awaiting_review, removed, hidden_removed)
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: sort_by
        in: query
        required: false
        description: Sort by field (created_at, updated_at)
        schema:
          type: string
      - name: sort_direction
        in: query
        required: false
        description: Sort direction (asc, desc)
        schema:
          type: string
      responses:
        '200':
          description: Successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/comment"
                  meta:
                    "$ref": "#/components/schemas/pagination_meta"
                required:
                - data
                - meta
                additionalProperties: false
        '404':
          description: Course or lecture not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '409':
          description: Comments not available for this lecture
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '422':
          description: Invalid parameters
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_error"
    post:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/comments"
      tags:
      - Courses
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/comment"
                required:
                - data
                additionalProperties: false
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_error"
        '404':
          description: Course or lecture not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '409':
          description: Comments not available for this lecture
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment_body:
                  type: string
                  description: Comment text
                comment_parent_id:
                  type: integer
                  nullable: true
                  description: Parent comment ID for replies
              required:
              - comment_body
              additionalProperties: false
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/comments/{id}":
    patch:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/comments/{id}"
      tags:
      - Courses
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: Comment ID
        schema:
          type: integer
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/comment"
                required:
                - data
                additionalProperties: false
        '400':
          description: Invalid status
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/validation_error"
        '404':
          description: Course, lecture, or comment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: New moderation status (approved, denied)
              required:
              - status
              additionalProperties: false
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/comments/{comment_id}":
    delete:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/comments/{comment_id}"
      tags:
      - Courses
      description: Delete a specific comment from a lecture.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: comment_id
        in: path
        required: true
        description: Comment ID
        schema:
          type: integer
      responses:
        '204':
          description: Successful
        '404':
          description: Course, lecture or comment not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/quizzes":
    post:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/quizzes"
      tags:
      - Courses
      description: Create a quiz with specific attributes in lecture.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      responses:
        '201':
          description: Successfull
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/quiz"
        required: true
        description: Quiz parameters
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/quizzes/{id}":
    put:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/quizzes/{id}"
      tags:
      - Courses
      description: Update a specific quiz in a lecture. Create, update or delete questions.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: Quiz ID
        schema:
          type: integer
      responses:
        '200':
          description: Successfull
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/quiz"
        required: true
        description: Quiz parameters
    delete:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/quizzes/{id}"
      tags:
      - Courses
      description: Delete a specific quiz from a lecture.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: id
        in: path
        required: true
        description: Quiz ID
        schema:
          type: integer
      responses:
        '204':
          description: Quiz deleted
        '404':
          description: Quiz not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/kong_api/v2/products/courses/{course_id}/lectures/{lecture_id}/users/{user_id}/completion":
    get:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/users/{user_id}/completion"
      tags:
      - Courses
      description: Returns the completion status of a lecture for a specific user.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: user_id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
      responses:
        '200':
          description: Completion status returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/lecture_completion"
                required:
                - data
                additionalProperties: false
        '404':
          description: Course, lecture, or user not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
        '409':
          description: User is not enrolled in the course
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
    delete:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/users/{user_id}/completion"
      tags:
      - Courses
      description: Marks a lecture as not completed for a specific user. Idempotent.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: user_id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
      responses:
        '204':
          description: Lecture marked as not completed
        '404':
          description: Course, lecture, or user not found
        '409':
          description: User is not enrolled in the course
    put:
      summary: "/v2/products/courses/{course_id}/lectures/{lecture_id}/users/{user_id}/completion"
      tags:
      - Courses
      description: Marks a lecture as completed for a user.
      parameters:
      - name: X-Consumer-Custom-ID
        in: header
        required: true
        description: School ID (provided by Kong gateway)
        schema:
          type: string
      - name: course_id
        in: path
        required: true
        description: Course ID
        schema:
          type: integer
      - name: lecture_id
        in: path
        required: true
        description: Lecture ID
        schema:
          type: integer
      - name: user_id
        in: path
        required: true
        description: User ID
        schema:
          type: integer
