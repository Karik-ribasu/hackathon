name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages (OpenAPI parser, codegen lib, HTTP client)
        run: npm run build:packages

      - name: Codegen (admin API tools)
        run: npm run codegen:admin-api

      - name: Verify generated output matches committed files
        run: |
          git diff --exit-code -- \
            apps/teachable-mastra-admin/src/generated/teachable-admin-tools/admin-api-tools.ts \
            packages/admin-tools-codegen/generated/teachable-admin-tools/admin-api-tools.ts

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Lint
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
